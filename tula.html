<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body.rio-tula {
      --agua: #1a5c8a; --agua-lt: #e4edf5;
      --inund: #611232; --inund-lt: #f3e4ea;
      --eco: #2d6b3a; --eco-lt: #e4f0e8;
      --vino: #611232; --vino-dk: #3d0b1f; --vino-lt: #f3e4ea;
    }
    body.rio-tula #app-header { background: #3d0b1f; }
    .back-to-rv {
      font-size: 11px; color: rgba(255,255,255,.55);
      text-decoration: none; letter-spacing: .04em;
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 4px;
    }
    .back-to-rv:hover { color: rgba(255,255,255,.9); }
  </style>
</head>
<body class="rio-tula">
<div id="app">
  <div id="app-header">
    <div>
      <a href="index.html" class="back-to-rv">‹ Ríos Vivos</a>
      <div id="panel-title" onclick="UI.goHome()" style="cursor:pointer">Río Tula</div>
    </div>
    <div id="panel-sub">Plan de acción 2025–2026 · Hidalgo · Estado de México</div>
  </div>
  <div id="app-body">
    <aside id="panel">
      <div id="eje-tabs">
        <button class="etab" id="tab-agua"  onclick="UI.selEje('agua')">Calidad<br>del agua</button>
        <button class="etab" id="tab-inund" onclick="UI.selEje('inund')">Inundaciones<br>y cauce</button>
        <button class="etab" id="tab-eco"   onclick="UI.selEje('eco')">Restauración<br>ecológica</button>
      </div>
      <div id="full-line"></div>
      <div id="plist"></div>
    </aside>
    <div id="map-wrap">
      <div id="map"></div>
      <div id="map-badge" class="hidden"><span id="map-badge-txt"></span></div>
      <div id="dbo-legend" class="hidden"></div>
    </div>
  </div>
</div>
